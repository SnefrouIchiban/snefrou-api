<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snefrou — Générateur de playlists</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #111111; --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.18);
    --text: #f0ede8; --text-muted: #6b6560; --text-secondary: #9d9890;
    --accent: #c8b89a; --green: #1DB954; --green-dim: rgba(29,185,84,0.12); --red: #e05a5a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; min-height: 100vh; line-height: 1.6; }
  .app { display: grid; grid-template-columns: 300px 1fr; min-height: 100vh; }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--accent); letter-spacing: -0.5px; }
  .logo span { font-style: italic; color: var(--text-muted); font-size: 12px; font-family: 'DM Mono', monospace; display: block; margin-top: 2px; font-weight: 300; }
  .section-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.75rem; }
  .auth-status { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--text-secondary); }
  .auth-status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
  .auth-status.connected .dot { background: var(--green); }
  .auth-status.connected { color: var(--text); border-color: rgba(29,185,84,0.2); }
  .btn { width: 100%; padding: 11px 16px; border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); text-align: left; }
  .btn:hover { border-color: var(--border-hover); color: var(--text); background: var(--surface2); }
  .btn.primary { background: var(--accent); color: #1a1600; border-color: var(--accent); font-weight: 500; text-align: center; }
  .btn.primary:hover { background: #ddd0b8; }
  .btn.spotify { background: var(--green-dim); border-color: rgba(29,185,84,0.3); color: var(--green); text-align: center; }
  .btn.spotify:hover { background: rgba(29,185,84,0.2); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .main { padding: 2rem 2.5rem; display: flex; flex-direction: column; gap: 2rem; }
  .prompt-zone textarea { width: 100%; min-height: 100px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Serif Display', serif; font-size: 20px; line-height: 1.5; resize: none; outline: none; }
  .prompt-zone textarea::placeholder { color: var(--text-muted); font-style: italic; }
  .generate-row { display: flex; gap: 12px; align-items: center; }
  .generate-row .btn { width: auto; padding: 10px 24px; }
  .count-select { padding: 9px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; outline: none; }
  .playlist-zone { display: none; }
  .playlist-zone.visible { display: block; }
  .playlist-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
  .playlist-title-input { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); background: transparent; border: none; outline: none; border-bottom: 1px solid transparent; padding-bottom: 2px; flex: 1; min-width: 200px; }
  .pl-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .pl-actions .btn { width: auto; padding: 8px 16px; font-size: 11px; }
  .track-list { display: flex; flex-direction: column; gap: 2px; }
  .track { display: grid; grid-template-columns: 28px 1fr auto auto; align-items: center; gap: 16px; padding: 10px 14px; border-radius: 6px; border: 1px solid transparent; transition: all 0.15s; }
  .track:hover { background: var(--surface); border-color: var(--border); }
  .track .num { font-size: 11px; color: var(--text-muted); text-align: right; }
  .track .info .t { font-size: 13px; color: var(--text); }
  .track .info .a { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .track .dur { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .track .remove-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 0 4px; opacity: 0; transition: opacity 0.15s, color 0.15s; line-height: 1; }
  .track:hover .remove-btn { opacity: 1; }
  .track .remove-btn:hover { color: var(--red); }
  .playlist-footer { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
  .pl-stats { font-size: 11px; color: var(--text-muted); }
  .loading { display: none; align-items: center; gap: 12px; padding: 1rem 0; }
  .loading.visible { display: flex; }
  .spinner { width: 16px; height: 16px; border: 1.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; color: var(--text-muted); }
  .banner { display: none; padding: 12px 16px; border-radius: 8px; font-size: 12px; border: 1px solid var(--border); }
  .banner.visible { display: block; }
  .banner.success { border-color: rgba(29,185,84,0.3); color: var(--green); }
  .banner.error { border-color: rgba(224,90,90,0.3); color: var(--red); }
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; font-size: 12px; color: var(--text); opacity: 0; transform: translateY(8px); transition: all 0.25s; z-index: 200; pointer-events: none; max-width: 340px; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: rgba(29,185,84,0.4); color: var(--green); }
  .toast.error { border-color: rgba(224,90,90,0.4); color: var(--red); }
  @media (max-width: 980px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div><div class="logo">Snefrou<span>playlist generator</span></div></div>

    <div>
      <div class="section-label">Spotify</div>
      <div class="auth-status" id="auth-status">
        <div class="dot"></div>
        <span id="auth-text">Non connecté</span>
      </div>
      <button class="btn spotify" style="margin-top:10px" onclick="connectSpotify()">Se connecter à Spotify</button>
      <button class="btn" style="margin-top:10px" onclick="disconnectSpotify()">Se déconnecter</button>
    </div>

    <div style="margin-top:auto">
      <div class="section-label">Statut</div>
      <div style="font-size:11px;color:var(--text-muted);line-height:1.8">Clé API gérée<br>côté serveur</div>
    </div>
  </div>

  <div class="main">
    <div class="banner" id="banner"></div>

    <div class="prompt-zone">
      <textarea id="prompt" placeholder="Décris ta playlist… jazz maghrébin sophistiqué, post-bop mélancolique années 60, électro minimaliste berlinoise…" rows="4"></textarea>
    </div>

    <div class="generate-row">
      <button class="btn primary" id="gen-btn" onclick="generate()">Générer</button>
      <select class="count-select" id="nb-tracks">
        <option value="10">10 titres</option>
        <option value="15" selected>15 titres</option>
        <option value="20">20 titres</option>
        <option value="30">30 titres</option>
      </select>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span class="loading-text" id="loading-text">Génération en cours…</span>
    </div>

    <div class="playlist-zone" id="playlist-zone">
      <div class="playlist-header">
        <input class="playlist-title-input" id="playlist-title" value="Ma playlist" />
        <div class="pl-actions">
          <button class="btn" onclick="copyList()">Copier</button>
          <button class="btn spotify" onclick="createSpotifyPlaylist()">Créer sur Spotify</button>
        </div>
      </div>

      <div class="track-list" id="track-list"></div>
      <div class="playlist-footer">
        <span class="pl-stats" id="pl-stats"></span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CLIENT_ID = 'cbdd9b0320874109a3640fe744b05c85';
const API_BASE = 'https://snefrou-api.vercel.app';

/*
  Important :
  si Spotify refuse encore le redirect URI, remplace cette ligne par l’URL exacte
  enregistrée dans ton dashboard Spotify, par ex :
  const REDIRECT_URI = 'https://ton-site.github.io/';
*/
const REDIRECT_URI = window.location.origin + window.location.pathname;

const SCOPES = 'playlist-modify-public playlist-modify-private';

let tracks = [];
let spotifyToken = null;
let spotifyUserId = null;

async function sha256(plain) {
  const enc = new TextEncoder().encode(plain);
  return crypto.subtle.digest('SHA-256', enc);
}

function base64urlencode(input) {
  return btoa(String.fromCharCode(...new Uint8Array(input)))
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=+$/,'');
}

async function generatePKCE() {
  const verifierBytes = crypto.getRandomValues(new Uint8Array(64));
  const verifier = base64urlencode(verifierBytes);
  const challenge = base64urlencode(await sha256(verifier));
  return { verifier, challenge };
}

function setConnected(yes) {
  document.getElementById('auth-status').classList.toggle('connected', yes);
  document.getElementById('auth-text').textContent = yes ? 'Connecté à Spotify' : 'Non connecté';
}

function clearOAuthTemp() {
  localStorage.removeItem('pkce_verifier');
  localStorage.removeItem('spotify_oauth_state');
}

function disconnectSpotify(silent = false) {
  localStorage.removeItem('spotify_token');
  localStorage.removeItem('spotify_token_exp');
  localStorage.removeItem('spotify_user_id');
  localStorage.removeItem('spotify_refresh_token');
  spotifyToken = null;
  spotifyUserId = null;
  setConnected(false);
  if (!silent) toast('Déconnecté de Spotify', 'success');
}

function loadConfig() {
  const tok = localStorage.getItem('spotify_token');
  const exp = localStorage.getItem('spotify_token_exp');
  const userId = localStorage.getItem('spotify_user_id');

  if (tok && exp && Date.now() < parseInt(exp, 10)) {
    spotifyToken = tok;
    spotifyUserId = userId || null;
    setConnected(true);
  } else {
    spotifyToken = null;
    spotifyUserId = null;
    setConnected(false);
  }
}

async function refreshSpotifyToken() {
  const refreshToken = localStorage.getItem('spotify_refresh_token');
  if (!refreshToken) return false;

  try {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'refresh_token',
        refresh_token: refreshToken,
        client_id: CLIENT_ID
      })
    });

    const data = await res.json();

    if (!res.ok || !data.access_token) {
      disconnectSpotify(true);
      return false;
    }

    spotifyToken = data.access_token;
    localStorage.setItem('spotify_token', spotifyToken);
    localStorage.setItem('spotify_token_exp', String(Date.now() + (data.expires_in * 1000)));

    if (data.refresh_token) {
      localStorage.setItem('spotify_refresh_token', data.refresh_token);
    }

    setConnected(true);
    return true;
  } catch (e) {
    console.error('refreshSpotifyToken error', e);
    disconnectSpotify(true);
    return false;
  }
}

async function ensureSpotifyToken() {
  const tok = localStorage.getItem('spotify_token');
  const exp = localStorage.getItem('spotify_token_exp');

  if (tok && exp && Date.now() < parseInt(exp, 10) - 10000) {
    spotifyToken = tok;
    return true;
  }

  return await refreshSpotifyToken();
}

async function spotifyFetch(url, options = {}, retry = true) {
  const ok = await ensureSpotifyToken();
  if (!ok) {
    throw new Error('Session Spotify expirée. Reconnecte-toi.');
  }

  const headers = {
    ...(options.headers || {}),
    Authorization: `Bearer ${spotifyToken}`
  };

  const res = await fetch(url, { ...options, headers });

  if (res.status === 401 && retry) {
    const refreshed = await refreshSpotifyToken();
    if (!refreshed) {
      throw new Error('Session Spotify expirée. Reconnecte-toi.');
    }

    const retryHeaders = {
      ...(options.headers || {}),
      Authorization: `Bearer ${spotifyToken}`
    };

    return fetch(url, { ...options, headers: retryHeaders });
  }

  if (res.status === 429) {
    const retryAfter = res.headers.get('Retry-After');
    throw new Error(`Trop de requêtes Spotify${retryAfter ? ' — réessaie dans ' + retryAfter + ' seconde(s)' : ''}`);
  }

  return res;
}

async function connectSpotify() {
  try {
    const { verifier, challenge } = await generatePKCE();
    const state = crypto.randomUUID();

    localStorage.setItem('pkce_verifier', verifier);
    localStorage.setItem('spotify_oauth_state', state);

    const authUrl = new URL('https://accounts.spotify.com/authorize');
    authUrl.searchParams.set('response_type', 'code');
    authUrl.searchParams.set('client_id', CLIENT_ID);
    authUrl.searchParams.set('scope', SCOPES);
    authUrl.searchParams.set('redirect_uri', REDIRECT_URI);
    authUrl.searchParams.set('state', state);
    authUrl.searchParams.set('code_challenge', challenge);
    authUrl.searchParams.set('code_challenge_method', 'S256');

    window.location.href = authUrl.toString();
  } catch (e) {
    console.error(e);
    toast(`Erreur Spotify : ${e.message}`, 'error');
  }
}

async function handleCallback() {
  try {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const returnedState = params.get('state');
    const error = params.get('error');

    if (error) {
      showBanner('Erreur Spotify : ' + error, 'error');
      clearOAuthTemp();
      window.history.replaceState({}, document.title, window.location.pathname);
      return false;
    }

    if (!code) return false;

    const savedState = localStorage.getItem('spotify_oauth_state');
    const verifier = localStorage.getItem('pkce_verifier');

    if (!returnedState || returnedState !== savedState || !verifier) {
      showBanner('Session expirée, reconnecte-toi.', 'error');
      window.history.replaceState({}, document.title, window.location.pathname);
      return false;
    }

    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        code,
        redirect_uri: REDIRECT_URI,
        client_id: CLIENT_ID,
        code_verifier: verifier
      })
    });

    const data = await res.json();

    if (!res.ok || !data.access_token) {
      throw new Error(data.error_description || data.error || 'Erreur inconnue Spotify');
    }

    spotifyToken = data.access_token;
    localStorage.setItem('spotify_token', spotifyToken);
    localStorage.setItem('spotify_token_exp', String(Date.now() + (data.expires_in * 1000)));

    if (data.refresh_token) {
      localStorage.setItem('spotify_refresh_token', data.refresh_token);
    }

    clearOAuthTemp();

    setConnected(true);
    await fetchUserId();

    showBanner('Connecté à Spotify !', 'success');
    window.history.replaceState({}, document.title, window.location.pathname);
    return true;
  } catch (e) {
    console.error(e);
    showBanner('Erreur Spotify : ' + e.message, 'error');
    return false;
  }
}

function showBanner(msg, type) {
  const b = document.getElementById('banner');
  b.textContent = msg;
  b.className = `banner visible ${type}`;
  if (type === 'success') {
    setTimeout(() => b.classList.remove('visible'), 5000);
  }
}

async function fetchUserId() {
  try {
    const res = await spotifyFetch('https://api.spotify.com/v1/me');
    const data = await res.json();

    if (!res.ok || !data.id) {
      throw new Error(data.error?.message || 'Impossible de récupérer l’utilisateur Spotify');
    }

    spotifyUserId = data.id;
    localStorage.setItem('spotify_user_id', spotifyUserId);
    return spotifyUserId;
  } catch (e) {
    console.error('fetchUserId error', e);
    return null;
  }
}

async function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) {
    toast("Décris d'abord ta playlist", 'error');
    return;
  }

  const nb = document.getElementById('nb-tracks').value;
  setLoading(true, 'Génération en cours…');

  try {
    const res = await fetch(`${API_BASE}/api/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, nb })
    });

    const parsed = await res.json();
    console.log('GENERATE STATUS', res.status, parsed);

    if (!res.ok) {
      const msg = parsed?.details?.error?.message || parsed?.error || 'Erreur serveur';
      throw new Error(msg);
    }

    tracks = parsed.tracks || [];
    document.getElementById('playlist-title').value = parsed.playlist_title || 'Ma playlist';

    renderPlaylist();
    document.getElementById('playlist-zone').classList.add('visible');
  } catch (e) {
    console.error(e);
    toast('Erreur génération : ' + e.message, 'error');
  } finally {
    setLoading(false);
  }
}

function renderPlaylist() {
  const list = document.getElementById('track-list');
  list.innerHTML = '';

  tracks.forEach((t, i) => {
    const title = t.title || 'Titre inconnu';
    const artist = t.artist || 'Artiste inconnu';
    const duration = t.duration || '';
    const searchUrl = `https://open.spotify.com/search/${encodeURIComponent(title + ' ' + artist)}`;

    const div = document.createElement('div');
    div.className = 'track';
    div.innerHTML = `
      <span class="num">${i + 1}</span>
      <div class="info">
        <a href="${searchUrl}" target="_blank" rel="noopener noreferrer" style="color:var(--text);text-decoration:none">
          <div class="t">${escapeHtml(title)}</div>
          <div class="a">${escapeHtml(artist)}</div>
        </a>
      </div>
      <span class="dur">${escapeHtml(duration)}</span>
      <button class="remove-btn" onclick="removeTrack(${i})">×</button>
    `;
    list.appendChild(div);
  });

  const total = tracks.reduce((acc, t) => {
    const raw = t.duration || '0:00';
    const p = raw.split(':');
    const minutes = parseInt(p[0], 10) || 0;
    const seconds = parseInt(p[1], 10) || 0;
    return acc + (minutes * 60) + seconds;
  }, 0);

  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);

  document.getElementById('pl-stats').textContent =
    `${tracks.length} titres · ~${h > 0 ? h + 'h' + String(m).padStart(2, '0') : m + ' min'}`;
}

function removeTrack(i) {
  tracks.splice(i, 1);
  renderPlaylist();
}

function copyList() {
  const lines = [document.getElementById('playlist-title').value, ''];
  tracks.forEach((t) => lines.push(`${t.title || ''} - ${t.artist || ''}`));

  navigator.clipboard.writeText(lines.join('\n'))
    .then(() => toast('Copié !', 'success'))
    .catch(() => toast('Impossible de copier', 'error'));
}

async function createSpotifyPlaylist() {
  if (!tracks.length) {
    toast('Aucun morceau à envoyer', 'error');
    return;
  }

  const hasToken = await ensureSpotifyToken();
  if (!hasToken) {
    toast("Connecte-toi d'abord à Spotify", 'error');
    return;
  }

  if (!spotifyUserId) {
    await fetchUserId();
  }

  const title = document.getElementById('playlist-title').value.trim() || 'Ma playlist';
  setLoading(true, 'Création de la playlist…');

  try {
    const plRes = await spotifyFetch('https://api.spotify.com/v1/me/playlists', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: title,
        description: 'Généré par Snefrou',
        public: false
      })
    });

    const pl = await plRes.json();

    if (!plRes.ok || !pl.id) {
      throw new Error(pl.error?.message || 'Erreur création playlist');
    }

    setLoading(true, 'Recherche des titres…');

    const uris = [];
    const notFound = [];

    for (const t of tracks) {
      const trackTitle = (t.title || '').trim();
      const trackArtist = (t.artist || '').trim();

      if (!trackTitle || !trackArtist) {
        notFound.push(`${trackTitle || '[sans titre]'} - ${trackArtist || '[sans artiste]'}`);
        continue;
      }

      const strictQuery = encodeURIComponent(`track:"${trackTitle}" artist:"${trackArtist}"`);
      let sRes = await spotifyFetch(`https://api.spotify.com/v1/search?q=${strictQuery}&type=track&limit=10`);
      let sData = await sRes.json();
      let items = sData.tracks?.items || [];
      let winner = pickBestSpotifyTrack(items, trackTitle, trackArtist);

      if (!winner) {
        const looseQuery = encodeURIComponent(`${trackTitle} ${trackArtist}`);
        sRes = await spotifyFetch(`https://api.spotify.com/v1/search?q=${looseQuery}&type=track&limit=10`);
        sData = await sRes.json();
        items = sData.tracks?.items || [];
        winner = pickBestSpotifyTrack(items, trackTitle, trackArtist);
      }

      if (winner?.uri) {
        uris.push(winner.uri);
      } else {
        notFound.push(`${trackTitle} - ${trackArtist}`);
      }
    }

    if (uris.length === 0) {
      throw new Error('Aucun morceau trouvé sur Spotify');
    }

    setLoading(true, 'Ajout des morceaux…');

    for (let i = 0; i < uris.length; i += 100) {
      const chunk = uris.slice(i, i + 100);
      const addRes = await spotifyFetch(`https://api.spotify.com/v1/playlists/${pl.id}/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uris: chunk })
      });

      const addData = await addRes.json();
      if (!addRes.ok) {
        throw new Error(addData.error?.message || 'Erreur ajout morceaux');
      }
    }

    let msg = `Playlist créée ! ${uris.length}/${tracks.length} titres ajoutés.`;
    if (notFound.length > 0) {
      msg += ` ${notFound.length} introuvable(s).`;
      console.warn('Introuvables :', notFound);
    }

    toast(msg, 'success');
  } catch (e) {
    console.error(e);
    toast('Erreur Spotify : ' + e.message, 'error');
  } finally {
    setLoading(false);
  }
}

function normalize(str) {
  return (str || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^\w\s]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function pickBestSpotifyTrack(items, wantedTitle, wantedArtist) {
  if (!items?.length) return null;

  const nt = normalize(wantedTitle);
  const na = normalize(wantedArtist);

  let best = null;
  let bestScore = -Infinity;

  for (const item of items) {
    const itemTitle = normalize(item.name);
    const artistNames = (item.artists || []).map(a => normalize(a.name));
    const joinedArtists = artistNames.join(' ');

    const titleExact = itemTitle === nt;
    const titleClose = itemTitle.includes(nt) || nt.includes(itemTitle);

    const artistExact = artistNames.some(a => a === na);
    const artistClose = artistNames.some(a => a.includes(na) || na.includes(a));

    if (!artistExact && !artistClose) continue;

    let score = 0;

    if (titleExact) score += 100;
    else if (titleClose) score += 40;
    else score -= 100;

    if (artistExact) score += 200;
    else if (artistClose) score += 120;

    const full = `${itemTitle} ${joinedArtists}`;
    if (full.includes('karaoke')) score -= 200;
    if (full.includes('tribute')) score -= 200;
    if (full.includes('cover')) score -= 120;
    if (full.includes('remix')) score -= 60;
    if (full.includes('live')) score -= 30;

    if (score > bestScore) {
      bestScore = score;
      best = item;
    }
  }

  return best;
}

function setLoading(on, msg) {
  document.getElementById('loading').classList.toggle('visible', on);
  if (msg) document.getElementById('loading-text').textContent = msg;
  document.getElementById('gen-btn').disabled = on;
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type || ''} show`;
  setTimeout(() => el.classList.remove('show'), 4000);
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

(async function init() {
  const handled = await handleCallback();
  if (!handled) {
    loadConfig();
  }
})();
</script>
